<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Policy for richardmelvin52 -->
  <policy user="richardmelvin52">
    <allow own="vn.edu.uit.FSS.DBDaemon"/>
    <allow own="vn.edu.uit.FSS.Sensor"/>
    <allow own="vn.edu.uit.FSS.FRTApp"/>
    <allow own="vn.edu.uit.FSS.RecommendDaemon"/>
    <allow own="vn.edu.uit.FSS.RecommendSystem"/>
    <!-- <allow own="vn.edu.uit.FSS.MagicMirror"/> -->
    <allow send_destination="vn.edu.uit.FSS.DBDaemon"/>
    <allow send_destination="vn.edu.uit.FSS.Sensor"/>
    <allow send_destination="vn.edu.uit.FSS.FRTApp"/>
    <allow send_destination="vn.edu.uit.FSS.RecommendDaemon"/>
    <allow send_destination="vn.edu.uit.FSS.RecommendSystem"/>
    <!-- <allow send_destination="vn.edu.uit.FSS.MagicMirror"/> -->
  </policy>

  <!-- Policy for root -->
  <policy user="root">
    <allow own="vn.edu.uit.FSS.DBDaemon"/>
    <allow own="vn.edu.uit.FSS.Sensor"/>
    <allow own="vn.edu.uit.FSS.FRTApp"/>
    <allow own="vn.edu.uit.FSS.RecommendDaemon"/>
    <allow own="vn.edu.uit.FSS.RecommendSystem"/>
    <!-- <allow own="vn.edu.uit.FSS.MagicMirror"/> -->
    <allow send_destination="vn.edu.uit.FSS.DBDaemon"/>
    <allow send_destination="vn.edu.uit.FSS.Sensor"/>
    <allow send_destination="vn.edu.uit.FSS.FRTApp"/>
    <allow send_destination="vn.edu.uit.FSS.RecommendDaemon"/>
    <allow send_destination="vn.edu.uit.FSS.RecommendSystem"/>
    <!-- <allow send_destination="vn.edu.uit.FSS.MagicMirror"/> -->
  </policy>

  <!-- Default policy -->
  <policy context="default">
    <allow send_destination="vn.edu.uit.FSS.DBDaemon"/>
    <allow send_destination="vn.edu.uit.FSS.Sensor"/>
    <allow send_destination="vn.edu.uit.FSS.FRTApp"/>
    <allow send_destination="vn.edu.uit.FSS.RecommendDaemon"/>
    <allow send_destination="vn.edu.uit.FSS.RecommendSystem"/>
    <!-- <allow send_destination="vn.edu.uit.FSS.MagicMirror"/> -->
    <allow receive_sender="vn.edu.uit.FSS.DBDaemon"/>
    <allow receive_sender="vn.edu.uit.FSS.Sensor"/>
    <allow receive_sender="vn.edu.uit.FSS.FRTApp"/>
    <allow receive_sender="vn.edu.uit.FSS.RecommendDaemon"/>
    <allow receive_sender="vn.edu.uit.FSS.RecommendSystem"/>
    <!-- <allow receive_sender="vn.edu.uit.FSS.MagicMirror"/> -->
  </policy>
</busconfig>
