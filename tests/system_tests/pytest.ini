[pytest]
markers =
    health: mark a test as a system health check.
    dbus: mark a test that requires D-Bus communication.
    e2e: mark a test as an end-to-end pipeline test.
testpaths = tests/system_tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
