#!/usr/bin/env bash
# ==============================================================================
# FSS Install Profile — Central Configuration
# ==============================================================================
#
# All FSS scripts source this file to get consistent paths, user settings,
# and deployment parameters. Override any variable by setting it in the
# environment BEFORE sourcing this file.
#
# Usage:
#   source "$(dirname "$0")/fss_profile.conf"    # from repo-root scripts
#   source "$FSS_ROOT/fss_profile.conf"           # when FSS_ROOT is known
#
# ==============================================================================

# --- Device Target -----------------------------------------------------------
# "rpi4b" (primary, ARM64) or "x86_dev" (best-effort, development only)
FSS_DEVICE="${FSS_DEVICE:-rpi4b}"

# --- Mode --------------------------------------------------------------------
# "dev"        — manual multi-terminal startup, logged-in user runs daemons
# "production" — systemd services, dedicated fss user, hardened permissions
FSS_MODE="${FSS_MODE:-dev}"

# --- Runtime User ------------------------------------------------------------
# In production: dedicated "fss" system account (nologin shell)
# In dev mode:   the currently logged-in user
if [[ "$FSS_MODE" == "production" ]]; then
    FSS_RUNTIME_USER="${FSS_RUNTIME_USER:-fss}"
else
    FSS_RUNTIME_USER="${FSS_RUNTIME_USER:-$USER}"
fi

# --- Project Root ------------------------------------------------------------
# Auto-resolved from this file's location; override only if you move the file.
if [[ -z "${FSS_ROOT:-}" ]]; then
    FSS_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
fi

# --- Runtime Directories (standardized layout under /opt/fss) ----------------
FSS_RUNTIME_DIR="${FSS_RUNTIME_DIR:-/opt/fss}"
FSS_DATA_DIR="${FSS_DATA_DIR:-${FSS_RUNTIME_DIR}/data}"
FSS_MODEL_DIR="${FSS_MODEL_DIR:-${FSS_RUNTIME_DIR}/models}"
FSS_ASSET_DIR="${FSS_ASSET_DIR:-${FSS_RUNTIME_DIR}/assets}"
FSS_IMAGE_DIR="${FSS_IMAGE_DIR:-${FSS_RUNTIME_DIR}/images}"
FSS_LOG_DIR="${FSS_LOG_DIR:-/var/log/fss}"

# --- Build Outputs (unified locations) ---------------------------------------
FSS_SENSOR_EXEC="${FSS_SENSOR_EXEC:-${FSS_ROOT}/sensor_daemon/build/sensor_daemon_exec}"
FSS_CAMERA_EXEC="${FSS_CAMERA_EXEC:-${FSS_ROOT}/frt_app/build/cpp_camera_core/camera_core_exec}"
FSS_TFLITE_LIB="${FSS_TFLITE_LIB:-${FSS_ROOT}/frt_app/build/c_tflite_reader/libtflite_reader.so}"

# --- Python Virtual Environments --------------------------------------------
FSS_VENV_DB_DAEMON="${FSS_ROOT}/db_daemon/venv"
FSS_VENV_RECOMMEND_DAEMON="${FSS_ROOT}/recommend_daemon/venv"
FSS_VENV_RECIPE_EXTRACTOR="${FSS_ROOT}/recipe_extractor/venv"
FSS_VENV_FRT_AI="${FSS_ROOT}/frt_app/py_ai_core/venv"
FSS_VENV_PY_BRIDGE="${FSS_ROOT}/electron_app/py_bridge/venv"

# --- Model Deployment --------------------------------------------------------
FSS_MODEL_VERSION="${FSS_MODEL_VERSION:-v0.1.0-alpha}"
FSS_MODEL_URL_BASE="${FSS_MODEL_URL_BASE:-https://github.com/BeginnerCoder52/FSS/releases/download}"
FSS_MODEL_FILE="${FSS_MODEL_FILE:-yolov11n.tflite}"
FSS_MODEL_CHECKSUM="${FSS_MODEL_CHECKSUM:-}"  # SHA256; empty = skip verification
FSS_MODEL_PATH="${FSS_MODEL_DIR}/${FSS_MODEL_FILE}"

# --- Camera Device -----------------------------------------------------------
FSS_CAMERA_DEVICE="${FSS_CAMERA_DEVICE:-/dev/video0}"

# --- D-Bus -------------------------------------------------------------------
FSS_DBUS_CONF_SYSTEM="/etc/dbus-1/system.d/vn.edu.uit.FSS.conf"
FSS_DBUS_CONF_TEMPLATE="${FSS_ROOT}/dbus_config/vn.edu.uit.FSS.conf.template"

# --- Systemd Service Names ---------------------------------------------------
FSS_SERVICE_SENSOR="fss-sensor"
FSS_SERVICE_CAMERA="fss-camera"
FSS_SERVICE_AI="fss-ai"
FSS_SERVICE_DB="fss-db"
FSS_SERVICE_RECOMMEND="fss-recommend"
FSS_SERVICE_UI="fss-magicmirror"

# ==============================================================================
# Authoritative APT package list
# ==============================================================================
FSS_APT_PACKAGES=(
    # Build tools
    build-essential cmake pkg-config

    # C++ libraries
    libi2c-dev i2c-tools
    libv4l-dev v4l-utils
    libsystemd-dev libsdbus-c++-dev libdbus-1-dev
    libzmq3-dev
    libsqlite3-dev
    libopencv-dev

    # Python
    python3-venv python3-dev
    python3-sdbus
    python3-systemd

    # Node.js
    nodejs npm

    # Utilities
    libxml2-utils   # xmllint for D-Bus config validation
)

# Optional: TFLite C API (only available on ARM / Raspberry Pi repos)
if [[ "$FSS_DEVICE" == "rpi4b" ]]; then
    FSS_APT_PACKAGES+=( libtensorflow-lite-dev )
fi

# ==============================================================================
# Python venv matrix
# ==============================================================================
# Format: "path:flags"
#   path  — relative to FSS_ROOT
#   flags — "ssp" = --system-site-packages, "" = isolated
FSS_PYTHON_VENVS=(
    "db_daemon:ssp"
    "recommend_daemon:"
    "recipe_extractor:"
    "frt_app/py_ai_core:ssp"
    "electron_app/py_bridge:ssp"
)

# MagicMirror module bridge venvs (all use --system-site-packages for sdbus)
FSS_MM_BRIDGE_VENVS=(
    "electron_app/magicmirror/modules/MMM-FSS-Env/py_bridge:ssp"
    "electron_app/magicmirror/modules/MMM-FSS-Inventory/py_bridge:ssp"
    "electron_app/magicmirror/modules/MMM-FSS-Monitor/py_bridge:ssp"
)

# ==============================================================================
# Helper: Logging functions (used by all FSS scripts)
# ==============================================================================
_FSS_RED='\033[0;31m'
_FSS_GREEN='\033[0;32m'
_FSS_YELLOW='\033[1;33m'
_FSS_BLUE='\033[0;34m'
_FSS_NC='\033[0m'

fss_log_info()  { echo -e "${_FSS_BLUE}[$(date +'%H:%M:%S')]${_FSS_NC} INFO: $1"; }
fss_log_ok()    { echo -e "${_FSS_GREEN}[$(date +'%H:%M:%S')] ✓${_FSS_NC} $1"; }
fss_log_warn()  { echo -e "${_FSS_YELLOW}[$(date +'%H:%M:%S')] ⚠${_FSS_NC} $1"; }
fss_log_error() { echo -e "${_FSS_RED}[$(date +'%H:%M:%S')] ✗${_FSS_NC} $1" >&2; }
fss_log_skip()  { echo -e "${_FSS_BLUE}[$(date +'%H:%M:%S')]${_FSS_NC} [SKIP] $1"; }

# ==============================================================================
# Self-validation
# ==============================================================================
if [[ ! -d "$FSS_ROOT/sensor_daemon" ]]; then
    fss_log_error "FSS_ROOT ($FSS_ROOT) does not look like an FSS project directory."
    fss_log_error "Expected sensor_daemon/ to exist. Check fss_profile.conf location."
    return 1 2>/dev/null || exit 1
fi
